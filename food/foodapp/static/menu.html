<!DOCTYPE html>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:url("C:\\Users\\Marliya Banu\\EX 6 WEBSITE\\softweb\\food\\foodapp\\static\\images\\bg6.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: darken(2px) brightness(0.6);
            z-index: -1;
        }

        .menu-card {
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            width: 320px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .menu-card h1 {
            text-align: center;
            color:pink;
            margin-bottom: 20px;
            font-size: 28px;
            text-transform: uppercase;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            border-bottom: 1px dashed pink;
        }

        .menu-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 15px;
        }

        .item-details {
            flex-grow: 1;
        }

        .item-name {
            font-size: 18px;
            color: white;
        }

        .item-price {
            font-weight: bold;
            color:white;
        }
    </style>
</head>
